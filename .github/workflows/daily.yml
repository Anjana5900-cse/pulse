name: Run Pulse Daily Task Bot

on:
  schedule:
    # 8:00 AM IST translates to 2:30 AM UTC
    - cron: '30 2 * * *'
  workflow_dispatch: # This adds the manual "Play" button!

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Task Bot
      run: python bot.py

    # This step captures the generated summary file and commits it back to your repository
    - name: Commit and Push changes
      run: |
        git config --global user.name "PulseBot[Bot]"
        git config --global user.email "pulsebot@users.noreply.github.com"
        git add daily_summary.txt
        git commit -m "Automated Daily Update: $(date)" || exit 0
        git push
        